<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>MuscleTrack</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- AUTH OVERLAY -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--accent)"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
        <h1>MuscleTrack</h1>
      </div>
      <p class="auth-subtitle">Suivez vos performances. Partagez votre progression.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <form id="auth-form" autocomplete="on">
        <div id="register-fields" class="hidden">
          <input type="text" id="auth-username" placeholder="Pseudo" autocomplete="username" />
        </div>
        <input type="email" id="auth-email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="auth-password" placeholder="Mot de passe" required autocomplete="current-password" />
        <p class="auth-error hidden" id="auth-error"></p>
        <button type="submit" class="btn-primary btn-full" id="auth-submit">Connexion</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app hidden">

    <!-- SIDEBAR (desktop) -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--accent)"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
        <span class="sidebar-logo-text">MuscleTrack</span>
      </div>

      <ul class="sidebar-nav">
        <li><a href="#/home" class="nav-link" data-page="home">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Accueil</span>
        </a></li>
        <li><a href="#/workout" class="nav-link" data-page="workout">
          <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
          <span>Workout</span>
        </a></li>
        <li><a href="#/history" class="nav-link" data-page="history">
          <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          <span>Historique</span>
        </a></li>
        <li><a href="#/dashboard" class="nav-link" data-page="dashboard">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
          <span>Progression</span>
        </a></li>
        <li><a href="#/profile" class="nav-link" data-page="profile">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>Profil</span>
        </a></li>
      </ul>

      <div class="sidebar-footer">
        <button id="theme-toggle" class="icon-btn" title="Changer le thème">
          <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
        </button>
        <button id="logout-btn" class="icon-btn logout-icon" title="Déconnexion">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content"></main>

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      <a href="#/home" class="bottom-nav-item" data-page="home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Accueil</span>
      </a>
      <a href="#/workout" class="bottom-nav-item" data-page="workout">
        <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
        <span>Workout</span>
      </a>
      <a href="#/history" class="bottom-nav-item" data-page="history">
        <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        <span>Historique</span>
      </a>
      <a href="#/dashboard" class="bottom-nav-item" data-page="dashboard">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        <span>Progression</span>
      </a>
      <a href="#/profile" class="bottom-nav-item" data-page="profile">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span>Profil</span>
      </a>
    </nav>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/workout.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
